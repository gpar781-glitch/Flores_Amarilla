<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Amarillas</title>
    <link rel="stylesheet" href="Css/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Dancing+Script:wght@700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="main-container">
        <div class="text-section">
            <h1 class="title">Flores Amarillas para el amor de mi vida:</h1>
            <div class="typing-container">
                <p id="typing-text"></p>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="treeCanvas"></canvas>
        </div>
    </div>

    <div class="counter-section">
        <p class="counter-title">Mi amor por ti comenzó hace...</p>
        <div id="counter" class="counter-time">00 días 00 horas 00 minutos 00 segundos</div>
    </div>

    <script src="script.js"></script>
</body>

</html>
