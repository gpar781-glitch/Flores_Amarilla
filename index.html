<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Amarillas</title>
    <link rel="stylesheet" href="Css/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Dancing+Script:wght@700&display=swap"
        rel="stylesheet">
</head>

<body>
    <h1 class="title global-title">Espero que te guste :D</h1>
    <div class="main-container">
        <div class="text-section">
            <div class="typing-container">
                <p id="typing-text"></p>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="treeCanvas"></canvas>
        </div>
    </div>

    <div class="counter-section">
        <p class="counter-title">Tiempo de recuperacion </p>
        <div id="counter" class="counter-time">00 días 00 horas 00 minutos 00 segundos</div>
    </div>
    <button id="music-btn" class="music-btn" title="Reproducir música">🎵</button>
    <audio id="bg-music" loop autoplay>
        <!-- URL pública gratuita como ejemplo, el usuario puede cambiarla -->
        <source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>

</html>
